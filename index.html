<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 28px; }
    .upload-area {
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: #00d4ff; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-text { font-size: 14px; color: #64748b; }
    #preview {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #00d4ff;
      color: #0f172a;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #results { margin-top: 24px; }
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1e293b;
    }
    .result-label { font-size: 14px; text-transform: capitalize; }
    .result-bar-wrap {
      flex: 1;
      margin: 0 12px;
      background: #0f172a;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }
    .result-bar {
      height: 100%;
      background: #00d4ff;
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .result-pct { font-size: 13px; color: #00d4ff; font-weight: 700; min-width: 48px; text-align: right; }
    .top-result {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #00d4ff;
      text-transform: capitalize;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Image Classifier</h1>
    <p class="subtitle">Upload an image to identify the main subject using AI</p>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)" />
      <div class="upload-icon">📁</div>
      <div class="upload-text">Click to upload an image</div>
    </div>
    <img id="preview" alt="Preview" />
    <button id="classifyBtn" onclick="classify()" disabled>Classify Image</button>
    <div id="results"></div>
  </div>

  <script>
    let selectedFile = null;

    function handleFile(e) {
      selectedFile = e.target.files[0];
      if (!selectedFile) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const preview = document.getElementById('preview');
        preview.src = ev.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(selectedFile);
      document.getElementById('classifyBtn').disabled = false;
      document.getElementById('results').innerHTML = '';
    }

    async function classify() {
      if (!selectedFile) return;
      const btn = document.getElementById('classifyBtn');
      btn.disabled = true;
      btn.textContent = 'Classifying...';

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res = await fetch('/classify', { method: 'POST', body: formData });
        const data = await res.json();
        displayResults(data.results);
      } catch (err) {
        document.getElementById('results').innerHTML = '<p style="color:#ef4444">Something went wrong. Try again.</p>';
      }

      btn.disabled = false;
      btn.textContent = 'Classify Image';
    }

    function displayResults(results) {
      const top = results[0];
      let html = `<div class="top-result">🏆 ${top.label}</div>`;
      results.forEach(r => {
        html += `
          <div class="result-item">
            <span class="result-label">${r.label}</span>
            <div class="result-bar-wrap"><div class="result-bar" style="width:${r.confidence}%"></div></div>
            <span class="result-pct">${r.confidence}%</span>
          </div>`;
      });
      document.getElementById('results').innerHTML = html;
    }
  </script>
</body>
</html>
